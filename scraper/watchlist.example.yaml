# Watchlist for the scraper. Copy to `watchlist.yaml` (gitignored on the VM) and edit.
# Slugs here are best guesses based on each company's career page URL — verify and
# fix as you go. A 4xx response on a source just logs a warning and skips it.
#
# Note on FAANG / big tech:
#   Most FAANG and big-tech companies (Meta, Apple, Amazon, Netflix, Google, Microsoft,
#   Oracle, Salesforce) run on proprietary ATSes or Workday — they will NOT be on
#   Greenhouse/Lever/Ashby. They're intentionally excluded here. A separate Workday
#   adapter would be a step 2.5 if/when you want them.

defaults:
  match_titles:
    - software engineer
    - software developer
    - backend engineer
    - frontend engineer
    - full stack engineer
    - full-stack engineer
    - fullstack engineer
    - web engineer
    - web developer
    - data engineer
    - data scientist
    - machine learning
    - ml engineer
    - research engineer
    - platform engineer
    - infrastructure engineer
    - devops engineer
    - site reliability
    - sre
    - ai engineer
    - applied scientist
    - new grad
    - new graduate
    - entry level
    - entry-level

