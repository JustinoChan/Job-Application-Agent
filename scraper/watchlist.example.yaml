# Watchlist for the scraper. Copy to `watchlist.yaml` (gitignored on the VM) and edit.
#
# All slugs in this file were probed live before commit. If you change a slug
# or add a new entry, verify it with:
#
#   python -m scraper.main --probe-watchlist
#
# That walks every entry, hits its source URL once, and reports OK / HTTP 404 /
# empty / etc. so you can prune dead entries before the next scheduled run.
#
# Note on FAANG / big tech:
#   Companies on Workday (Salesforce, NVIDIA, Adobe, etc.) are now supported
#   via the `workday` adapter — see the BIG TECH / WORKDAY section below.
#
#   These FAANG companies use proprietary career sites and need dedicated
#   adapters (not yet built):
#     - Meta:    GraphQL API at metacareers.com
#     - Apple:   REST API at jobs.apple.com/api/role/search
#     - Amazon:  JSON API at amazon.jobs/en/search.json
#     - Google:  Custom API at careers.google.com
#     - Netflix: REST API at jobs.netflix.com/api/search
#   Apple, Amazon, and Netflix have the most accessible APIs if you want to
#   add them later.
#
# Note on freshness:
#   The scraper drops postings older than MAX_POSTING_AGE_DAYS (default 30) via
#   each board's posted/updated timestamp. Boards with hundreds of jobs (e.g.
#   Databricks, Stripe) often have many older ones that simply won't enter the
#   tracker — that's intentional, and means a 4-hour run usually surfaces just
#   the last cycle's new/updated postings per company.

defaults:
  match_titles:
    - software engineer
    - software developer
    - backend engineer
    - frontend engineer
    - full stack engineer
    - full-stack engineer
    - fullstack engineer
    - web engineer
    - web developer
    - data engineer
    - data scientist
    - machine learning
    - ml engineer
    - research engineer
    - platform engineer
    - infrastructure engineer
    - devops engineer
    - site reliability
    - sre
    - ai engineer
    - applied scientist
    - new grad
    - new graduate
    - entry level
    - entry-level

