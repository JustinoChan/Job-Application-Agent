  # Workday is the dominant ATS for large enterprises. To find a company's
  # Workday URL, Google: site:myworkdayjobs.com <company name>
  #
  # Config fields:
  #   workday_host  — the *.myworkdayjobs.com hostname
  #   workday_site  — board name in the URL path (usually "External")
  #   company_slug  — tenant name (subdomain before .wdN)
  #
  # Verify with: python -m scraper.main --probe-watchlist
  - kind: workday
    company_slug: salesforce
    label: Salesforce
    workday_host: salesforce.wd12.myworkdayjobs.com
    workday_site: External
  - kind: workday
    company_slug: nvidia
    label: NVIDIA
    workday_host: nvidia.wd5.myworkdayjobs.com
    workday_site: NVIDIAExternalCareerSite
  - kind: workday
    company_slug: adobe
    label: Adobe
    workday_host: adobe.wd5.myworkdayjobs.com
    workday_site: external_experienced
  - kind: workday
    company_slug: servicenow
    label: ServiceNow
    workday_host: servicenow.wd1.myworkdayjobs.com
    workday_site: Careers
  - kind: workday
    company_slug: visa
    label: Visa
    workday_host: visa.wd12.myworkdayjobs.com
    workday_site: Visa_Careers

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  HN WHO'S HIRING (monthly thread)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # The scraper now correctly fetches the *current month's* thread via
  # search_by_date. Keywords below are inclusive; narrow them if too noisy.
  - kind: hn_who_is_hiring
    label: HN Who Is Hiring
    match_keywords:
      - python
      - react
      - django
      - typescript
      - machine learning
      - new grad
      - new graduate
      - entry level
      - junior
      - intern
